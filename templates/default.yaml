images:
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    arch: "x86_64"

mounts: []

ssh:
  forwardAgent: false
  loadDotSSHPubKeys: false

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        git curl wget jq unzip ca-certificates \
        ripgrep fd-find \
        python3 python3-pip python3-venv pipx \
        build-essential \
        nmap netcat-openbsd socat tcpdump

      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs

  - mode: user
    script: |
      #!/bin/bash
      set -eux

      mkdir -p ~/workspace/persistent

      # bun
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"

      # bun global install dir needs a package.json
      mkdir -p "$HOME/.bun/install/global"
      (cd "$HOME/.bun/install/global" && bun init -y >/dev/null)

      # npm global prefix in $HOME (pi uses npm for some packages)
      mkdir -p "$HOME/.npm-global"
      npm config set prefix "$HOME/.npm-global"

      # PATH for login shells
      if ! grep -q 'PIBOX PATH' ~/.bashrc; then
        echo '' >> ~/.bashrc
        echo '# PIBOX PATH' >> ~/.bashrc
        echo 'export PATH="$HOME/.npm-global/bin:$HOME/.bun/bin:$HOME/.local/bin:$PATH"' >> ~/.bashrc
      fi

      bun i -g @mariozechner/pi-coding-agent

      command -v pi >/dev/null || { echo "ERROR: pi not on PATH"; exit 1; }
      curl -fsSL https://pkg.lightpanda.io/install.sh | bash
